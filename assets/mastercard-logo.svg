<svg width="48" height="30" viewBox="0 0 48 30" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Clip path for the true intersection -->
    <clipPath id="clipLeft">
      <circle cx="15" cy="15" r="12"/>
    </clipPath>
  </defs>
  
  <!-- Official Mastercard Symbol - Brand compliant -->
  <!-- Red circle (left) - Official Mastercard Red -->
  <circle cx="15" cy="15" r="12" fill="#EB001B"/>
  
  <!-- Yellow circle (right) - Official Mastercard Yellow -->
  <circle cx="33" cy="15" r="12" fill="#F79E1B"/>
  
  <!-- True intersection: right circle clipped by left circle area -->
  <circle cx="33" cy="15" r="12" fill="#FF5F00" clip-path="url(#clipLeft)"/>
</svg>